---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: PR - Build Changed Containerfiles

on:
  pull_request:
    paths:
      - "**/Containerfile"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      changed-containerfiles: ${{ steps.changed-containerfiles.outputs.changed_containerfiles }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Get Changed Containerfiles
        uses: ./.github/actions/changed-containerfiles
        id: changed-containerfiles

  build:
    name: Build Containerfile
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      matrix:
        files: ${{ fromJSON(needs.prepare.outputs.changed-containerfiles) }}
      fail-fast: false
      max-parallel: 4
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          file: ${{ matrix.files }}
          push: false
