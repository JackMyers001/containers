---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: RW - Build and Push Container

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      app_version:
        required: true
        type: string
      containerfile_path:
        required: true
        type: string

jobs:
  build:
    name: Build and Push Container
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Docker meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}
          flavor: latest=false
          annotations: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}/${{ inputs.containerfile_path }}
            org.opencontainers.image.title=${{ inputs.app_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.app_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.app_version }}
            type=semver,pattern={{major}},value=${{ inputs.app_version }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        id: push
        with:
          file: ${{ inputs.containerfile_path }}
          push: true
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Attestation
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          push-to-registry: true
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ inputs.app_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
